{% extends "base.html" %}
{% block content %}
<div class="card-panel" style="margin-top: 20px;">
    <h5>Lista de Funcionários</h5>
    <form method="GET" action="/lista">
        <div class="row">
            <div class="col s8">
                <select name="departamento" class="browser-default">
                    <option value="Todos">Todos os Departamentos</option>
                    <option value="TI">TI</option>
                    <option value="RH">RH</option>
                    <option value="Vendas">Vendas</option>
                </select>
            </div>
            <div class="col s4">
                <button class="btn blue">Filtrar</button>
            </div>
        </div>
    </form>

    <table class="highlight">
        <thead>
            <tr>
                <th>Nome</th><th>Cargo</th><th>Depto</th><th>Salário</th><th>Ações</th>
            </tr>
        </thead>
        <tbody>
            {% for f in funcionarios %}
            <tr>
                <td>{{ f['nome'] }}</td>
                <td>{{ f['cargo'] }}</td>
                <td>{{ f['departamento'] }}</td>
                <td>R$ {{ f['salario'] }}</td>
                <td>
                    <a href="/delete/{{ f['id'] }}" class="btn-small red"><i class="material-icons">delete_forever</i></a>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
